services:
  mysql:
    image: mysql:8.0
    ports:
      - '3306:3306'
    environment:
      MYSQL_ROOT_PASSWORD: 'secret123'
      MYSQL_DATABASE: my_new_db
    volumes:
      - mysql-data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ['CMD', 'mysqladmin', 'ping', '-h', 'localhost']
      retries: 10
      timeout: 5s

  backend:
    build:
      context: ./backend/laravel-realworld-example-app
      dockerfile: Dockerfile
    ports:
      - '8000:8000'
    depends_on:
      mysql:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend/vue3-realworld-example-app
      dockerfile: Dockerfile
    ports:
      - '4173:4173'
    depends_on:
      - backend

  k6:
    image: grafana/k6
    command: run /scripts/load-test.js
    volumes:
      - ./performance:/scripts
    environment:
      - API_BASE=http://backend:8000/api
    depends_on:
      - backend

volumes:
  mysql-data: